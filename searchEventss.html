<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap');

    :root{
      --bg:#060816;
      --card:#0f172a;
      --card2:#131c31;
      --accent:#ff6b35;
      --accent2:#ff955f;
      --white:#ffffff;
      --muted:#94a3b8;
      --border:rgba(255,255,255,0.07);
      --shadow:0 20px 60px rgba(0,0,0,0.45);
      }



      *{
        margin:0;
        padding:0;
        box-sizing:border-box;
      }

      body{
        background:linear-gradient(to bottom,#050816,#091120);
        color:var(--white);
        font-family:'Inter',sans-serif;
        min-height:100vh;
        overflow-x:hidden;
        padding:60px 20px;
      }



      .search-panel{
        width:100%;
        max-width:1100px;
        margin:auto;
        animation:fadeUp 0.7s ease;
      }

      .search-panel h2{
        font-size:54px;
        font-family:'Playfair Display',serif;
        margin-bottom:12px;
      }

      .search-panel h2 span{
        color:var(--accent);
      }

      .search-panel p{
        color:var(--muted);
        font-size:18px;
        margin-bottom:40px;
        line-height:1.7;
      }



      .search-box{
        background:rgba(15,23,42,0.85);
        border:1px solid var(--border);
        backdrop-filter:blur(18px);
      
        border-radius:32px;
      
        padding:35px;
      
        display:grid;
        grid-template-columns:1.4fr 1fr 1fr auto;
        gap:22px;
      
        align-items:end;
      
        box-shadow:var(--shadow);
      }



      .form-label{
        display:block;
        margin-bottom:12px;
        color:#cbd5e1;
        font-size:14px;
        font-weight:600;
        letter-spacing:.5px;
      }

      .form-input{
        width:100%;
        background:var(--card2);
        border:1px solid rgba(255,255,255,0.06);
      
        height:58px;
      
        border-radius:16px;
      
        padding:0 18px;
      
        color:white;
      
        font-size:15px;
      
        outline:none;
      
        transition:0.3s;
      }

      .form-input:focus{
        border-color:var(--accent);
        box-shadow:0 0 0 4px rgba(255,107,53,0.15);
      }

      .form-input::placeholder{
        color:#64748b;
      }


      .location-toggle{
        display:flex;
        gap:12px;
      }

      .loc-tab{
        flex:1;
      
        border:none;
      
        height:58px;
      
        border-radius:16px;
      
        background:var(--card2);
      
        color:#cbd5e1;
      
        cursor:pointer;
      
        font-weight:600;
      
        transition:0.3s;
      }

      .loc-tab.active{
        background:linear-gradient(135deg,var(--accent),var(--accent2));
        color:white;
        box-shadow:0 8px 25px rgba(255,107,53,0.35);
      }



      .live-status{
        background:var(--card2);
      
        border-radius:16px;
      
        height:58px;
      
        display:flex;
      
        align-items:center;
      
        padding:0 18px;
      
        margin-bottom:12px;
      
        color:#cbd5e1;
      
        font-size:14px;
      }

      .btn-detect{
        width:100%;
      
        height:58px;
      
        border:none;
      
        border-radius:16px;
      
        background:#1e293b;
      
        color:white;
      
        font-weight:600;
      
        cursor:pointer;
      
        transition:0.3s;
      }

      .btn-detect:hover{
        background:#293548;
      }


      .btn-search{
        height:58px;
      
        padding:0 34px;
      
        border:none;
      
        border-radius:18px;
      
        background:linear-gradient(135deg,var(--accent),var(--accent2));
      
        color:white;
      
        font-size:16px;
      
        font-weight:700;
      
        cursor:pointer;
      
        white-space:nowrap;
      
        transition:0.35s;
      
        box-shadow:
        0 12px 30px rgba(255,107,53,0.35);
      }

      .btn-search:hover{
        transform:translateY(-3px);
      }


      .city-chips{
        display:flex;
        flex-wrap:wrap;
        gap:10px;
        margin-top:14px;
      }

      .chip{
        background:#172036;
        padding:10px 16px;
        border-radius:30px;
        color:#dbe4f0;
        cursor:pointer;
        transition:0.3s;
        font-size:14px;
      }

      .chip:hover{
        background:var(--accent);
      }

      .detected-city{
        margin-top:12px;
        color:#22c55e;
        font-weight:600;
      }


      @media(max-width:1000px){
      
        .search-box{
          grid-template-columns:1fr;
        }
      
      }

      @media(max-width:700px){
      
        .search-panel h2{
          font-size:40px;
        }
      
        .location-toggle{
          flex-direction:column;
        }
      

      }
      .logout-btn{
        text-decoration:none;
        background:#ff6b35;
        color:white;
        padding:12px 22px;
        border-radius:12px;
        font-weight:600;
        transition:0.3s;
          }

        .out-btn:hover{
        background:#ff844f;
        }
      #bt{
        text-decoration:none;
        background:#ff6b35;
        color:white;
        padding:12px 22px;
        border-radius:12px;
        font-weight:600;
        transition:0.3s;
      }
    </style>
</head>
<body>

    <div class="search-panel" id="searchPanel">
      <h2>Welcome back, <span id="username">Friend</span> </h2>
      <p>Search events near you — use GPS or enter any city manually</p>

        <form action = "/location" method = "post">

            <button class="loc-tab active" id="tabLive" onclick="setLocMode('live')">

          </div>
        </div>

      <form action="/event" method="post">
        <div class="loc-box">
        <select name="city" class="form-input" required>
        <option value="">Select City</option>
        <option value="jaipur">Jaipur</option>
        <option value="mumbai">Mumbai</option>
        <option value="delhi">Delhi</option>
        <option value="bangalore">Bangalore</option>
        <option value="hyderabad">Hyderabad</option>
        <option value="pune">Pune</option>
        </select>

        <button type="submit" id = "bt">Submit</button>

        </form>



        <a href="/logout" class="logout-btn">

        </a>

        
      </div>

</body>
</html>
